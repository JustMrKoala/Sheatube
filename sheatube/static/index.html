<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheatube</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --card: #16161f; --border: #252530;
    --accent: #ff3c5c; --accent2: #ff8c42; --text: #f0f0f5; --muted: #6b6b80; --hover: #1e1e2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; height: 60px;
    display: flex; align-items: center; gap: 1.5rem;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none; flex-shrink: 0;
  }
  .search-wrap { flex: 1; max-width: 520px; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.5rem 1rem 0.5rem 2.4rem;
    color: var(--text); font-family: inherit; font-size: 0.9rem; outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .si { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }

  .btn { border-radius: 8px; padding: 0.45rem 1rem; font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.35rem; transition: opacity 0.2s, transform 0.1s; border: none; }
  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { border-color: var(--accent); }

  .user-chip {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.35rem 0.75rem;
    font-size: 0.85rem; cursor: pointer;
    text-decoration: none; color: var(--text);
    transition: border-color 0.2s;
  }
  .user-chip:hover { border-color: var(--accent); }
  .user-chip .avatar {
    width: 22px; height: 22px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: grid; place-items: center;
    font-size: 0.65rem; font-weight: 700; color: #fff; flex-shrink: 0;
    overflow: hidden;
  }
  .user-chip .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .hero { padding: 2.5rem 2rem 1.5rem; text-align: center; }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 6vw, 5rem);
    letter-spacing: 3px; line-height: 1;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero p { color: var(--muted); margin-top: 0.5rem; }
  .content-shell {
    display: grid;
    grid-template-columns: 190px minmax(0, 1fr);
    gap: 1.4rem;
    padding: 0 2rem 2.5rem;
    align-items: start;
  }
  .left-tabs {
    position: sticky;
    top: 78px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.6rem;
  }
  .mode-tabs { display: flex; flex-direction: column; gap: 0.45rem; }
  .mode-tab {
    width: 100%;
    text-align: left;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    border-radius: 10px;
    padding: 0.55rem 0.75rem;
    cursor: pointer;
  }
  .mode-tab.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }

  .feed-panel { min-width: 0; }
  .section-label {
    padding: 0 0 0.9rem; font-size: 0.75rem; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 0.75rem;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .stream-wrap { max-height: calc(100vh - 220px); overflow-y: auto; padding-right: 0.25rem; }
  .stream-wrap.shorts-mode {
    max-height: calc(100vh - 170px);
    height: calc(100vh - 170px);
    padding-right: 0;
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  .stream-wrap.shorts-mode::-webkit-scrollbar { display: none; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; padding: 0 0 1rem; }
  .grid.spark-stream {
    grid-template-columns: minmax(320px, 520px);
    justify-content: center;
    gap: 0;
    padding-bottom: 0;
  }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; cursor: pointer; text-decoration: none; color: inherit;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 32px rgba(255,60,92,0.12); }

  .thumb { width: 100%; aspect-ratio: 16/9; background: var(--surface); position: relative; overflow: hidden; }
  .thumb video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .kind-chip { position:absolute; top:0.55rem; left:0.55rem; background:rgba(0,0,0,0.6); color:#fff; font-size:0.66rem; letter-spacing:.5px; text-transform:uppercase; padding:0.2rem 0.45rem; border-radius:999px; z-index:2; }

  .card-body { padding: 0.875rem 1rem; min-height: 96px; }
  .card-title { font-weight: 600; font-size: 0.95rem; line-height: 1.35; min-height: 2.55em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-uploader { color: var(--accent); font-size: 0.82rem; font-weight: 500; margin-top: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { display: flex; gap: 0.75rem; color: var(--muted); font-size: 0.78rem; margin-top: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .spark-card {
    border: none;
    border-radius: 0;
    background: transparent;
    box-shadow: none;
    scroll-snap-align: start;
    min-height: calc(100vh - 170px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.35rem 0;
  }
  .spark-card:hover { transform: none; border-color: transparent; box-shadow: none; }
  .spark-card .thumb {
    aspect-ratio: 9/16;
    width: auto;
    max-width: min(100%, 520px);
    height: min(calc(100vh - 210px), 82vh);
    max-height: 82vh;
    border-radius: 16px;
    overflow: hidden;
  }
  .spark-card .thumb video { object-fit: cover; }
  .spark-overlay {
    position:absolute;
    inset:auto 0 0 0;
    background:linear-gradient(180deg,transparent 68%,rgba(0,0,0,0.62));
    padding:0.5rem 0.7rem 0.55rem;
  }
  .spark-title { font-weight:600; font-size:0.86rem; line-height:1.25; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; text-shadow:0 1px 2px rgba(0,0,0,0.55); }
  .spark-meta { color:#d7d7dd; font-size:0.72rem; margin-top:0.12rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow:0 1px 2px rgba(0,0,0,0.45); }
  .spark-play-btn {
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    z-index:3;
    border:1px solid rgba(255,255,255,0.7);
    background:rgba(0,0,0,0.6);
    color:#fff;
    border-radius:999px;
    padding:0.4rem 0.9rem;
    font-family:inherit;
    font-size:0.8rem;
    font-weight:600;
    letter-spacing:0.2px;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transition:opacity .15s ease;
  }
  .spark-play-btn.visible {
    opacity:1;
    pointer-events:auto;
  }
  .spark-side-actions {
    position:absolute;
    right:0.6rem;
    bottom:4.75rem;
    z-index:3;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:0.5rem;
    pointer-events:auto;
  }
  .spark-action-btn,
  .spark-sub-btn {
    border:1px solid rgba(255,255,255,0.45);
    background:rgba(0,0,0,0.45);
    color:#fff;
    border-radius:999px;
    padding:0.25rem 0.55rem;
    font-family:inherit;
    font-size:0.72rem;
    font-weight:600;
    cursor:pointer;
    pointer-events:auto;
  }
  .spark-action-btn.active,
  .spark-sub-btn.active {
    border-color:rgba(255,140,66,0.9);
    background:rgba(255,60,92,0.28);
  }
  .spark-comments-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
    z-index: 160;
  }
  .spark-comments-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }
  .spark-comments-panel {
    position: fixed;
    top: 72px;
    right: 14px;
    bottom: 14px;
    width: min(360px, 34vw);
    background: #0f0f16;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 18px 42px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    transform: translateX(110%);
    transition: transform .22s ease;
    z-index: 170;
  }
  .spark-comments-panel.open { transform: translateX(0); }
  .spark-comments-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.6rem;
    padding: 0.8rem 0.9rem;
    border-bottom: 1px solid var(--border);
  }
  .spark-comments-title { font-size: 0.84rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }
  .spark-comments-close {
    border: 1px solid var(--border);
    background: transparent;
    color: #d7d7dd;
    border-radius: 8px;
    font-size: 0.75rem;
    padding: 0.25rem 0.6rem;
    cursor: pointer;
  }
  .spark-comments-list {
    flex: 1;
    overflow: auto;
    padding: 0.75rem 0.9rem;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }
  .spark-comment-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 0.55rem 0.6rem;
  }
  .spark-comment-head {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.28rem;
  }
  .spark-comment-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg,var(--accent),var(--accent2));
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .spark-comment-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .spark-comment-user {
    color: #f0f0f5;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .spark-comment-user:hover { color: #fff; text-decoration: underline; }
  .spark-comment-meta {
    color: #c2c2ca;
    font-size: 0.73rem;
    display: flex;
    gap: 0.45rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .spark-comment-text { font-size: 0.82rem; color: #f0f0f5; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
  .spark-comments-empty { color: var(--muted); font-size: 0.82rem; text-align: center; padding: 1.2rem 0.4rem; }
  .spark-comments-form {
    border-top: 1px solid var(--border);
    padding: 0.7rem 0.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .spark-comments-form textarea {
    width: 100%;
    min-height: 68px;
    resize: vertical;
    max-height: 160px;
    background: #141420;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 0.6rem 0.7rem;
    font-family: inherit;
    font-size: 0.86rem;
    outline: none;
  }
  .spark-comments-form button {
    align-self: flex-end;
    border: 1px solid rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.08);
    color: #fff;
    border-radius: 999px;
    padding: 0.35rem 0.9rem;
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
  }

  .empty { grid-column: 1/-1; text-align: center; padding: 5rem 1rem; color: var(--muted); }
  .empty .big { font-size: 3rem; margin-bottom: 1rem; }
  .empty h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: var(--text); }

  .skeleton { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; animation: pulse 1.5s infinite; }
  .sk-thumb { aspect-ratio: 16/9; background: var(--hover); }
  .sk-body { padding: 0.875rem 1rem; }
  .sk-line { height: 0.8rem; background: var(--hover); border-radius: 4px; margin-bottom: 0.5rem; }
  .sk-line.short { width: 60%; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  @media (max-width: 980px){
    .content-shell { grid-template-columns: 1fr; gap: 0.9rem; }
    .left-tabs { position: static; padding: 0.45rem; }
    .mode-tabs { flex-direction: row; flex-wrap: wrap; }
    .mode-tab { width: auto; text-align: center; }
    .stream-wrap { max-height: none; overflow: visible; }
    .stream-wrap.shorts-mode {
      max-height: calc(100vh - 120px);
      height: calc(100vh - 120px);
      overflow-y: auto;
      scroll-snap-type: y mandatory;
    }
    .spark-card { min-height: calc(100vh - 120px); }
    .spark-card .thumb {
      width: auto;
      max-width: min(96vw, 520px);
      height: min(calc(100vh - 180px), 80vh);
      max-height: calc(100vh - 180px);
    }
    .spark-comments-panel {
      top: auto;
      right: 0;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 50vh;
      border-radius: 16px 16px 0 0;
      transform: translateY(110%);
    }
    .spark-comments-panel.open { transform: translateY(0); }
  }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">SHEATUBE</a>
  <div class="search-wrap">
    <span class="si">&#128269;</span>
    <input type="search" id="searchInput" placeholder="Search videos...">
  </div>
  <div class="nav-right" id="navRight">
    <!-- filled by JS -->
  </div>
</nav>

<div class="hero">
  <h1>Watch Everything</h1>
  <p>Public videos. No nonsense.</p>
</div>

<div class="content-shell">
  <aside class="left-tabs">
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabHome" type="button" onclick="switchKind('home')">Home</button>
      <button class="mode-tab" id="tabSpark" type="button" onclick="switchKind('spark')">Sparks</button>
    </div>
  </aside>
  <section class="feed-panel">
    <div class="section-label" id="sectionLabel">Home Feed</div>
    <div class="stream-wrap" id="streamWrap">
      <div class="grid" id="grid">
        <div class="skeleton"><div class="sk-thumb"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
        <div class="skeleton"><div class="sk-thumb"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
        <div class="skeleton"><div class="sk-thumb"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
      </div>
    </div>
  </section>
</div>
<div id="sparkCommentsBackdrop" class="spark-comments-backdrop" onclick="closeSparkComments()"></div>
<aside id="sparkCommentsPanel" class="spark-comments-panel" aria-hidden="true">
  <div class="spark-comments-head">
    <div class="spark-comments-title">Comments</div>
    <button type="button" class="spark-comments-close" onclick="closeSparkComments()">Close</button>
  </div>
  <div id="sparkCommentsList" class="spark-comments-list">
    <div class="spark-comments-empty">Open a Spark to view comments.</div>
  </div>
  <form class="spark-comments-form" onsubmit="submitSparkComment(event)">
    <textarea id="sparkCommentInput" maxlength="800" placeholder="Add a comment..."></textarea>
    <button type="submit">Post</button>
  </form>
</aside>

<script>
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(iso){
  const d=Date.now()-new Date(iso+'Z').getTime(), m=Math.floor(d/60000), h=Math.floor(m/60), dy=Math.floor(h/24);
  if(dy>365) return Math.floor(dy/365)+'y ago';
  if(dy>30) return Math.floor(dy/30)+'mo ago';
  if(dy>0) return dy+'d ago';
  if(h>0) return h+'h ago';
  if(m>0) return m+'m ago';
  return 'Just now';
}
function fv(n){ if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'K'; return n; }
function avatarHtml(user){
  const name = (user && user.username) ? user.username : '?';
  const fallback = esc(name[0].toUpperCase());
  const url = (user && user.avatar_url) ? String(user.avatar_url).trim() : '';
  return url ? `<div class="avatar"><img src="${esc(url)}" alt=""></div>` : `<div class="avatar">${fallback}</div>`;
}

let me = null;
let activeKind = 'home';
let sparkObserver = null;
let sparkAudioEnabled = true;
let sparkCommentsVideoId = null;

async function loadMe(){
  const r = await fetch('/api/auth/me');
  const d = await r.json();
  me = d.user;
  renderNav();
}

function renderNav(){
  const nr = document.getElementById('navRight');
  if(me){
    nr.innerHTML = `
      <a href="/upload" class="btn btn-primary">Upload</a>
      <a href="/profile" class="user-chip">
        ${avatarHtml(me)}
        ${esc(me.username)}
      </a>`;
  } else {
    nr.innerHTML = `
      <a href="/login" class="btn btn-ghost">Log in</a>
      <a href="/register" class="btn btn-primary">Sign up</a>`;
  }
}

function streamUrl(id){ return '/api/stream/' + encodeURIComponent(id); }
function notify(msg){ window.alert(msg); }
function stopEvt(e){
  if (!e) return;
  e.preventDefault();
  e.stopPropagation();
}

function renderCard(v){
  if (v.kind === 'spark'){
    return `<article class="card spark-card">
      <div class="thumb">
        <video class="spark-feed-video" src="${streamUrl(v.id)}" preload="metadata" muted autoplay loop playsinline disablepictureinpicture controlslist="nodownload noplaybackrate" oncontextmenu="return false;" onclick="toggleSparkPlayback(event)"></video>
        <div class="spark-overlay">
          <div class="spark-title">${esc(v.title)}</div>
          <div class="spark-meta">${esc(v.uploader)} · ${fv(v.views)} views · ${timeAgo(v.uploaded_at)}</div>
        </div>
        <button type="button" class="spark-play-btn" onclick="toggleSparkPlayback(event)">Play</button>
        <div class="spark-side-actions">
          <button type="button" class="spark-action-btn spark-like-btn ${v.liked_by_me ? 'active' : ''}" data-video-id="${v.id}" onclick="toggleSparkLike(event, '${v.id}')">${v.liked_by_me ? 'Liked' : 'Like'} · <span>${fv(v.likes_count || 0)}</span></button>
          <button type="button" class="spark-action-btn spark-comment-btn" data-video-id="${v.id}" onclick="openSparkComments(event, '${v.id}')">Comment · <span data-raw="${v.comments_count || 0}">${fv(v.comments_count || 0)}</span></button>
          ${me && !v.uploader_is_me ? `<button type="button" class="spark-sub-btn ${v.uploader_is_subscribed ? 'active' : ''}" data-user-id="${v.user_id}" onclick="toggleSparkSubscribe(event, '${v.user_id}')">${v.uploader_is_subscribed ? 'Subscribed' : 'Subscribe'}</button>` : ''}
        </div>
        <span class="kind-chip">Spark</span>
      </div>
    </article>`;
  }
  return `<a class="card" href="/watch?id=${v.id}">
    <div class="thumb">
      <video src="${streamUrl(v.id)}" preload="metadata" muted playsinline disablepictureinpicture controlslist="nodownload noplaybackrate" oncontextmenu="return false;"></video>
    </div>
    <div class="card-body">
      <div class="card-title">${esc(v.title)}</div>
      <div class="card-uploader">${esc(v.uploader)}</div>
      <div class="card-meta"><span>Video</span><span>${fv(v.views)} views</span><span>${timeAgo(v.uploaded_at)}</span></div>
    </div>
  </a>`;
}

function switchKind(kind){
  activeKind = kind;
  document.getElementById('tabHome').classList.toggle('active', kind === 'home');
  document.getElementById('tabSpark').classList.toggle('active', kind === 'spark');
  if (kind !== 'spark') closeSparkComments();
  load(document.getElementById('searchInput').value.trim());
}

function setupSparkPlayback(){
  if (sparkObserver) sparkObserver.disconnect();
  const streamWrap = document.getElementById('streamWrap');
  const vids = Array.from(document.querySelectorAll('.spark-feed-video'));
  if (!vids.length) return;
  vids.forEach((v)=>{
    delete v.dataset.active;
    v.muted = true;
    delete v.dataset.userPaused;
    v.onplay = ()=> applySparkAudioState();
    v.onpause = ()=> applySparkAudioState();
    v.onplaying = ()=> applySparkAudioState();
  });
  applySparkAudioState();
  // Always start at the first Spark so the card snaps into a full, predictable view.
  streamWrap.scrollTo({ top: 0, behavior: 'auto' });
  const first = vids[0];
  if (first){
    first.dataset.active = '1';
    applySparkAudioState();
    first.play().then(()=>applySparkAudioState()).catch(()=>{});
  }
  sparkObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      const vid = entry.target;
      if (entry.isIntersecting && entry.intersectionRatio > 0.55){
        vids.forEach((other)=>{ if (other !== vid) delete other.dataset.active; });
        vid.dataset.active = '1';
        applySparkAudioState();
        if (vid.dataset.userPaused !== '1') vid.play().then(()=>applySparkAudioState()).catch(()=>{});
      } else {
        delete vid.dataset.active;
        delete vid.dataset.userPaused;
        vid.muted = true;
        vid.pause();
      }
    });
  }, { threshold: [0.55], root: streamWrap });
  vids.forEach((v)=> sparkObserver.observe(v));
}

function applySparkAudioState(){
  const vids = Array.from(document.querySelectorAll('.spark-feed-video'));
  vids.forEach((v)=>{
    const isActive = v.dataset.active === '1';
    v.muted = !(sparkAudioEnabled && isActive);
  });
  document.querySelectorAll('.spark-play-btn').forEach((btn)=>{
    const card = btn.closest('.spark-card');
    const vid = card ? card.querySelector('.spark-feed-video') : null;
    const isActive = !!(vid && vid.dataset.active === '1');
    const paused = !!(vid && isActive && (vid.paused || vid.dataset.userPaused === '1'));
    btn.classList.toggle('visible', paused);
    if (paused) btn.textContent = 'Play';
  });
}

function toggleSparkPlayback(e){
  stopEvt(e);
  const src = e ? e.currentTarget : null;
  const srcThumb = src ? src.closest('.thumb') : null;
  const vid = src && src.classList.contains('spark-feed-video')
    ? src
    : (srcThumb ? srcThumb.querySelector('.spark-feed-video') : null);
  if (!vid || vid.dataset.active !== '1') return;
  if (vid.paused || vid.dataset.userPaused === '1'){
    delete vid.dataset.userPaused;
    vid.play().catch(()=>{});
  } else {
    vid.dataset.userPaused = '1';
    vid.pause();
  }
  applySparkAudioState();
}

function syncSparkLike(videoId, liked, likesCount){
  document.querySelectorAll(`.spark-like-btn[data-video-id="${videoId}"]`).forEach((btn)=>{
    btn.classList.toggle('active', !!liked);
    btn.innerHTML = `${liked ? 'Liked' : 'Like'} · <span>${fv(likesCount || 0)}</span>`;
  });
}

function bumpSparkComment(videoId){
  document.querySelectorAll(`.spark-comment-btn[data-video-id="${videoId}"] span`).forEach((count)=>{
    const current = Number(count.dataset.raw || '0') || 0;
    const next = current + 1;
    count.dataset.raw = String(next);
    count.textContent = fv(next);
  });
}

function setSparkCommentCount(videoId, total){
  document.querySelectorAll(`.spark-comment-btn[data-video-id="${videoId}"] span`).forEach((count)=>{
    const next = Math.max(0, Number(total || 0));
    count.dataset.raw = String(next);
    count.textContent = fv(next);
  });
}

function syncSparkSubscribe(userId, subscribed){
  document.querySelectorAll(`.spark-sub-btn[data-user-id="${userId}"]`).forEach((btn)=>{
    btn.classList.toggle('active', !!subscribed);
    btn.textContent = subscribed ? 'Subscribed' : 'Subscribe';
  });
}

async function toggleSparkLike(e, videoId){
  stopEvt(e);
  if(!me){ notify('Log in to like videos.'); return; }
  const r = await fetch('/api/videos/' + encodeURIComponent(videoId) + '/like', { method: 'POST' });
  const d = await r.json();
  if(!r.ok){ notify(d.error || 'Could not like this Spark.'); return; }
  syncSparkLike(videoId, d.liked, d.likes_count);
}

function renderSparkComments(comments){
  const list = document.getElementById('sparkCommentsList');
  if(!comments.length){
    list.innerHTML = `<div class="spark-comments-empty">No comments yet.</div>`;
    return;
  }
  const commentAvatar = (c)=>{
    const name = (c && c.username) ? String(c.username) : 'User';
    const fallback = esc((name.trim()[0] || 'U').toUpperCase());
    const url = (c && c.avatar_url) ? String(c.avatar_url).trim() : '';
    return url
      ? `<div class="spark-comment-avatar"><img src="${esc(url)}" alt=""></div>`
      : `<div class="spark-comment-avatar">${fallback}</div>`;
  };
  const commentUserLink = (c)=>{
    const name = esc((c && c.username) ? String(c.username) : 'User');
    const uid = (c && c.user_id) ? String(c.user_id).trim() : '';
    if (!uid) return `<span class="spark-comment-user">${name}</span>`;
    return `<a class="spark-comment-user" href="/profile?user=${encodeURIComponent(uid)}">${name}</a>`;
  };
  list.innerHTML = comments.map((c)=>`
    <div class="spark-comment-item">
      <div class="spark-comment-head">
        ${commentAvatar(c)}
        <div style="min-width:0">
          ${commentUserLink(c)}
          <div class="spark-comment-meta"><span>${timeAgo(c.created_at || new Date().toISOString())}</span></div>
        </div>
      </div>
      <div class="spark-comment-text">${esc(c.text || '')}</div>
    </div>
  `).join('');
}

async function loadSparkComments(videoId){
  const list = document.getElementById('sparkCommentsList');
  list.innerHTML = `<div class="spark-comments-empty">Loading comments...</div>`;
  const r = await fetch('/api/videos/' + encodeURIComponent(videoId) + '/comments');
  if(!r.ok){
    list.innerHTML = `<div class="spark-comments-empty">Could not load comments.</div>`;
    return [];
  }
  const comments = await r.json();
  const items = Array.isArray(comments) ? comments : [];
  renderSparkComments(items);
  setSparkCommentCount(videoId, items.length);
  return items;
}

function openSparkComments(e, videoId){
  stopEvt(e);
  sparkCommentsVideoId = videoId;
  document.getElementById('sparkCommentsPanel').classList.add('open');
  document.getElementById('sparkCommentsBackdrop').classList.add('open');
  document.getElementById('sparkCommentsPanel').setAttribute('aria-hidden', 'false');
  loadSparkComments(videoId).catch(()=>{});
}

function closeSparkComments(){
  document.getElementById('sparkCommentsPanel').classList.remove('open');
  document.getElementById('sparkCommentsBackdrop').classList.remove('open');
  document.getElementById('sparkCommentsPanel').setAttribute('aria-hidden', 'true');
  sparkCommentsVideoId = null;
}

async function submitSparkComment(e){
  stopEvt(e);
  if(!sparkCommentsVideoId){ notify('Open a Spark first.'); return; }
  if(!me){ notify('Log in to comment.'); return; }
  const input = document.getElementById('sparkCommentInput');
  const text = (input.value || '').trim();
  if(!text) return;
  const r = await fetch('/api/videos/' + encodeURIComponent(sparkCommentsVideoId) + '/comments', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({ text })
  });
  const d = await r.json();
  if(!r.ok){ notify(d.error || 'Could not post comment.'); return; }
  input.value = '';
  const comments = await loadSparkComments(sparkCommentsVideoId);
  setSparkCommentCount(sparkCommentsVideoId, comments.length);
}

async function toggleSparkSubscribe(e, userId){
  stopEvt(e);
  if(!me){ notify('Log in to subscribe.'); return; }
  const r = await fetch('/api/users/' + encodeURIComponent(userId) + '/subscribe', { method:'POST' });
  const d = await r.json();
  if(!r.ok){ notify(d.error || 'Could not update subscribe state.'); return; }
  syncSparkSubscribe(userId, d.subscribed);
}

async function load(q=''){
  const qs = new URLSearchParams();
  if (q) qs.set('q', q);
  qs.set('kind', activeKind === 'spark' ? 'spark' : 'video');
  const query = qs.toString();
  const r = await fetch('/api/videos' + (query ? '?' + query : ''));
  const videos = await r.json();
  const grid = document.getElementById('grid');
  const streamWrap = document.getElementById('streamWrap');
  grid.classList.toggle('spark-stream', activeKind === 'spark');
  streamWrap.classList.toggle('shorts-mode', activeKind === 'spark');
  const sectionLabel = document.getElementById('sectionLabel');
  sectionLabel.textContent = activeKind === 'spark' ? 'Sparks' : 'Home Feed';
  if (activeKind !== 'spark' && sparkObserver) sparkObserver.disconnect();
  if (activeKind !== 'spark') closeSparkComments();
  if(!videos.length){
    grid.innerHTML = `<div class="empty"><div class="big">[ ]</div><h2>${q?'No Results':'No Videos Yet'}</h2><p>${q?'Try another search.':'<a href="/upload" style="color:var(--accent)">Upload the first one!</a>'}</p></div>`;
    return;
  }
  const feed = videos;
  if(!feed.length){
    if (activeKind === 'spark'){
      grid.innerHTML = `<div class="empty"><div class="big">[ ]</div><h2>No Sparks Yet</h2><p>Upload any clip and it will auto-fit Spark format.</p></div>`;
    } else {
      grid.innerHTML = `<div class="empty"><div class="big">[ ]</div><h2>No Videos Yet</h2><p><a href="/upload" style="color:var(--accent)">Upload the first one!</a></p></div>`;
    }
    return;
  }
  grid.innerHTML = feed.map(renderCard).join('');
  grid.querySelectorAll('video').forEach(v=>{ v.addEventListener('loadedmetadata',()=>{ v.currentTime=0.05; }); });
  if (activeKind === 'spark') setupSparkPlayback();
}
let timer;
document.getElementById('searchInput').addEventListener('input', e=>{ clearTimeout(timer); timer=setTimeout(()=>load(e.target.value.trim()),300); });
document.addEventListener('keydown', (e)=>{ if (e.key === 'Escape') closeSparkComments(); });

loadMe();
load();
</script>
